path: servers/custom/src/custom.py
parameter: servers/custom/parameter.yaml
tools:
  search_r1_query_extract:
    input:
      ans_ls: ans_ls
    output:
    - extract_query_list
  r1_searcher_query_extract:
    input:
      ans_ls: ans_ls
    output:
    - extract_query_list
  iterretgen_nextquery:
    input:
      q_ls: q_ls
      ans_ls: ret_psg
    output:
    - nextq_ls
  output_extract_from_boxed:
    input:
      ans_ls: ans_ls
    output:
    - pred_ls
  ircot_get_first_sent:
    input:
      ans_ls: ans_ls
    output:
    - q_ls
  ircot_extract_ans:
    input:
      ans_ls: ans_ls
    output:
    - pred_ls
  search_o1_init_list:
    input:
      q_ls: q_ls
    output:
    - total_subq_list
    - total_reason_list
    - total_final_info_list
  search_o1_combine_list:
    input:
      total_subq_list: total_subq_list
      extract_query_list: extract_query_list
      total_reason_list: total_reason_list
      extract_reason_list: extract_reason_list
    output:
    - total_subq_list
    - total_reason_list
  search_o1_query_extract:
    input:
      ans_ls: ans_ls
    output:
    - extract_query_list
  search_o1_reasoning_extract:
    input:
      ans_ls: ans_ls
    output:
    - extract_reason_list
  search_o1_extract_final_information:
    input:
      ans_ls: ans_ls
    output:
    - extract_final_infor_list
  search_o1_combine_final_information:
    input:
      total_final_info_list: total_final_info_list
      extract_final_infor_list: extract_final_infor_list
    output:
    - total_final_info_list
  merge_passages:
    input:
      temp_psg: temp_psg
      ret_psg: ret_psg
    output:
    - ret_psg
  evisrag_output_extract_from_special:
    input:
      ans_ls: ans_ls
    output:
    - pred_ls
  assign_citation_ids:
    input:
      ret_psg: ret_psg
    output:
    - ret_psg
  init_citation_registry:
    input:
      q_ls: q_ls
    output:
    - q_ls
  assign_citation_ids_stateful:
    input:
      ret_psg: ret_psg
    output:
    - ret_psg
  surveycpm_init_citation_registry:
    input:
      instruction_ls: instruction_ls
    output:
    - instruction_ls
  surveycpm_process_passages_with_citation:
    input:
      ret_psg_ls: ret_psg_ls
      survey_ls: survey_ls
    output:
    - retrieved_info_ls
    - ret_psg
  surveycpm_state_init:
    input:
      instruction_ls: instruction_ls
    output:
    - state_ls
    - cursor_ls
    - survey_ls
    - step_ls
    - extend_time_ls
    - extend_result_ls
    - retrieved_info_ls
    - parsed_ls
  surveycpm_parse_search_response:
    input:
      response_ls: response_ls
      surveycpm_hard_mode: $surveycpm_hard_mode
    output:
    - keywords_ls
    - parsed_ls
  surveycpm_process_passages:
    input:
      ret_psg_ls: ret_psg_ls
    output:
    - retrieved_info_ls
  surveycpm_after_init_plan:
    input:
      response_ls: response_ls
      survey_ls: survey_ls
      instruction_ls: instruction_ls
      surveycpm_hard_mode: $surveycpm_hard_mode
    output:
    - survey_ls
    - cursor_ls
    - parsed_ls
  surveycpm_after_write:
    input:
      response_ls: response_ls
      survey_ls: survey_ls
      cursor_ls: cursor_ls
      instruction_ls: instruction_ls
      retrieved_info_ls: retrieved_info_ls
      surveycpm_hard_mode: $surveycpm_hard_mode
    output:
    - survey_ls
    - cursor_ls
    - parsed_ls
  surveycpm_after_extend:
    input:
      response_ls: response_ls
      survey_ls: survey_ls
      cursor_ls: cursor_ls
      instruction_ls: instruction_ls
      surveycpm_hard_mode: $surveycpm_hard_mode
    output:
    - survey_ls
    - cursor_ls
    - extend_result_ls
    - parsed_ls
  surveycpm_update_state:
    input:
      state_ls: state_ls
      cursor_ls: cursor_ls
      extend_time_ls: extend_time_ls
      extend_result_ls: extend_result_ls
      step_ls: step_ls
      parsed_ls: parsed_ls
      surveycpm_max_step: $surveycpm_max_step
      surveycpm_max_extend_step: $surveycpm_max_extend_step
    output:
    - state_ls
    - extend_time_ls
    - step_ls
  surveycpm_check_completion:
    input:
      step_ls: step_ls
      state_ls: state_ls
      surveycpm_max_step: $surveycpm_max_step
    output:
    - state_ls
  surveycpm_format_output:
    input:
      survey_ls: survey_ls
      instruction_ls: instruction_ls
    output:
    - ans_ls
prompts: {}
